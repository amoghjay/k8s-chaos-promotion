image:
  repository: us-central1-docker.pkg.dev/amoghdevops/k8s-chaos-demo/url-shortener
  tag: "latest"           # Kargo overrides per promotion
  pullPolicy: IfNotPresent

replicaCount: 1
podAntiAffinity:
  enabled: false
podDisruptionBudget:
  enabled: false
  minAvailable: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  requests: { cpu: 50m, memory: 64Mi }
  limits: { cpu: 200m, memory: 256Mi }

app:
  baseUrl: "http://localhost:8000"
  codeLength: "8"
  redisTtl: "3600"
  workers: "2"

radius:
  enabled: false
  rpcUrl: ""
  serviceWalletAddress: ""
  sbcContractAddress: "0x33ad9e4bd16b69b5bfded37d8b5d9ff9aba014fb"
  shortenFee: "1000"
  rpcTimeoutSeconds: "10"
  chainId: "72344"

postgresql:
  enabled: true
  auth:
    username: urlshortener
    password: ""     # never set here — pass via --set postgresql.auth.password=<value> or ESO in Phase 4
    database: urlshortener
  primary:
    persistence: { enabled: true, size: 1Gi }

redis:
  enabled: true
  architecture: standalone   # single master pod — correct chaos target
  auth:
    enabled: false
  master:
    persistence: { enabled: true, size: 1Gi }

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automount: false

metrics:
  enabled: true
  port: "8000"
  path: "/metrics"

externalSecrets:
  enabled: false                          # true in dev/staging/prod — false for local dev without ESO
  secretStoreName: "gcp-secret-manager"
  secretStoreKind: "ClusterSecretStore"
  radiusRpcUrlSecret: "radius-rpc-url-testnet"       # GCP Secret Manager key name
  serviceWalletSecret: "service-wallet-address-testnet"
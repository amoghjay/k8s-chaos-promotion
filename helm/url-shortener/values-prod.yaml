replicaCount: 2

podAntiAffinity:
  enabled: true
podDisruptionBudget:
  enabled: true
  minAvailable: 1

app:
  baseUrl: "http://localhost:8080"
  workers: "4"

radius:
  enabled: true
  rpcUrl: ""                  # passed via --set at install time
  serviceWalletAddress: ""    # passed via --set at install time
  rpcTimeoutSeconds: "10"

resources:
  requests: { cpu: 200m, memory: 256Mi }
  limits: { cpu: 1000m, memory: 1Gi }

postgresql:
  auth:
    password: ""              # passed via --set at install time — never commit prod passwords
  primary:
    persistence:
      enabled: true
      size: 5Gi

serviceAccount:
  annotations: {}             # WI binding added in Phase 4/5 when ESO is set up

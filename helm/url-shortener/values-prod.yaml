image:
  tag: "latest"  # managed by Kargo — do not edit manually

replicaCount: 2

podAntiAffinity:
  enabled: true
podDisruptionBudget:
  enabled: true
  minAvailable: 1

app:
  baseUrl: "http://localhost:8080"
  workers: "4"

radius:
  enabled: true
  rpcUrl: ""                  # injected via ESO ExternalSecret
  serviceWalletAddress: ""    # injected via ESO ExternalSecret
  chainId: "723"              # mainnet
  rpcTimeoutSeconds: "10"

resources:
  requests: { cpu: 200m, memory: 256Mi }
  limits: { cpu: 1000m, memory: 1Gi }

postgresql:
  auth:
    existingSecret: url-shortener-prod-secret
  primary:
    persistence:
      enabled: true
      size: 5Gi

serviceAccount:
  annotations: {}             # WI binding added in Phase 4/5 when ESO is set up

externalSecrets:
  enabled: true
  radiusRpcUrlSecret: "radius-rpc-url-mainnet"
  serviceWalletSecret: "service-wallet-address-mainnet"

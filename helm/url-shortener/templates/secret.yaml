apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "url-shortener.fullname" . }}-secret
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
stringData:
  REDIS_URL: {{ printf "redis://%s:6379" (include "url-shortener.redisHost" .) | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:5432/%s" .Values.postgresql.auth.username (required "postgresql.auth.password is required — pass via --set or ESO" .Values.postgresql.auth.password) (include "url-shortener.postgresHost" .) .Values.postgresql.auth.database | quote }}
  {{- if .Values.radius.enabled }}
  RADIUS_RPC_URL: {{ .Values.radius.rpcUrl | quote }}
  {{- end }}

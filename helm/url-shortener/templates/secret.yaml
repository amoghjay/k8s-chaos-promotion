{{- if not .Values.externalSecrets.enabled }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "url-shortener.fullname" . }}-secret
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
stringData:
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:5432/%s" .Values.postgresql.auth.username (required "postgresql.auth.password is required for local dev — pass via --set postgresql.auth.password=<value>" .Values.postgresql.auth.password) (include "url-shortener.postgresHost" .) .Values.postgresql.auth.database | quote }}
  {{- if .Values.radius.enabled }}
  RADIUS_RPC_URL: {{ required "radius.rpcUrl is required for local dev — pass via --set radius.rpcUrl=<value>" .Values.radius.rpcUrl | quote }}
  SERVICE_WALLET_ADDRESS: {{ required "radius.serviceWalletAddress is required for local dev — pass via --set radius.serviceWalletAddress=<value>" .Values.radius.serviceWalletAddress | quote }}
  {{- end }}
{{- end }}

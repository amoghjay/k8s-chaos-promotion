apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "url-shortener.fullname" . }}-config
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
data:
  BASE_URL: {{ .Values.app.baseUrl | quote }}
  CODE_LENGTH: {{ .Values.app.codeLength | quote }}
  REDIS_TTL: {{ .Values.app.redisTtl | quote }}
  WORKERS: {{ .Values.app.workers | quote }}
  REDIS_URL: {{ printf "redis://%s:6379" (include "url-shortener.redisHost" .) | quote }}
  SBC_CONTRACT_ADDRESS: {{ .Values.radius.sbcContractAddress | quote }}
  SHORTEN_FEE: {{ .Values.radius.shortenFee | quote }}
  RPC_TIMEOUT_SECONDS: {{ .Values.radius.rpcTimeoutSeconds | quote }}
  RADIUS_CHAIN_ID: {{ .Values.radius.chainId | quote }}
  {{- if and .Values.radius.enabled (not .Values.externalSecrets.enabled) }}
  SERVICE_WALLET_ADDRESS: {{ required "radius.serviceWalletAddress is required for local dev" .Values.radius.serviceWalletAddress | quote }}
  {{- end }}
replicaCount: 1

# No PDB or anti-affinity needed in dev — single replica is fine
podAntiAffinity:
  enabled: false
podDisruptionBudget:
  enabled: false

app:
  baseUrl: "http://localhost:8080"
  workers: "1"

radius:
  enabled: true
  rpcUrl: ""                  # passed via --set at install time
  serviceWalletAddress: ""    # passed via --set at install time

resources:
  requests: { cpu: 50m, memory: 64Mi }
  limits: { cpu: 200m, memory: 256Mi }

serviceAccount:
  annotations: {}             # WI binding added in Phase 4/5 when ESO is set up

externalSecrets:
  enabled: true
  radiusRpcUrlSecret: "radius-rpc-url-testnet"
  serviceWalletSecret: "service-wallet-address-testnet"

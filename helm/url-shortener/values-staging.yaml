image:
  tag: sha-1a78ed3

replicaCount: 2

# Anti-affinity spreads pods across nodes so a single node failure doesn't
# take down the whole app. PDB ensures at least 1 pod stays running during
# voluntary disruptions (node drain, rolling update).
podAntiAffinity:
  enabled: true
podDisruptionBudget:
  enabled: true
  minAvailable: 1

app:
  baseUrl: "http://localhost:8080"
  workers: "2"

radius:
  enabled: true
  # facilitatorUrl + networkCaip2 default to testnet via values.yaml
  serviceWalletAddress: ""    # passed via --set at install time
  facilitatorTimeoutSeconds: "30"  # generous — facilitator does the on-chain work

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits: { cpu: 500m, memory: 512Mi }

serviceAccount:
  annotations: {}             # WI binding added in Phase 4/5 when ESO is set up

postgresql:
  auth:
    existingSecret: url-shortener-staging-secret

externalSecrets:
  enabled: true
  serviceWalletSecret: "service-wallet-address-testnet"

apiVersion: v2
name: url-shortener
description: FastAPI URL shortener with Redis, PostgreSQL, and optional Radius testnet payment verification.
type: application
version: 0.1.0
appVersion: "1.0.0"
dependencies:
  - name: redis
    version: "25.3.5"   # exact version from: helm search repo bitnami/redis
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: postgresql
    version: "18.5.7"   # exact version from: helm search repo bitnami/postgresql
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
apiVersion: v1
kind: ConfigMap
metadata:
  name: url-shortener-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    # Grafana sidecar discovers ConfigMaps with this label (searchNamespace: ALL)
    grafana_dashboard: "1"
data:
  url-shortener.json: |
    {
      "title": "URL Shortener + Signer (x402 / Permit2)",
      "uid": "url-shortener",
      "schemaVersion": 38,
      "refresh": "10s",
      "time": { "from": "now-15m", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "label": "Environment",
            "type": "custom",
            "query": "url-shortener-dev,url-shortener-staging,url-shortener-prod",
            "current": { "text": "url-shortener-staging", "value": "url-shortener-staging" },
            "options": [
              { "text": "url-shortener-dev",     "value": "url-shortener-dev"     },
              { "text": "url-shortener-staging",  "value": "url-shortener-staging"  },
              { "text": "url-shortener-prod",     "value": "url-shortener-prod"     }
            ],
            "includeAll": false,
            "multi": false,
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 100,
          "type": "row",
          "title": "Traffic Overview",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 }
        },
        {
          "id": 1,
          "title": "Request Rate by Handler",
          "description": "Request rate at the app, split by route. Watch for traffic collapse during chaos.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 1, "w": 12, "h": 7 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"url-shortener\", namespace=\"$namespace\"}[1m])) by (handler, method)",
              "legendFormat": "{{ "{{handler}} {{method}}" }}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 } } }
        },
        {
          "id": 2,
          "title": "P95 Latency by Handler",
          "description": "Per-route p95. /shorten = app + facilitator round-trip (verify + settle). /{code} = redirect path (Redis or Postgres). Both should stay flat under chaos unless an upstream dep degrades.",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 1, "w": 12, "h": 7 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"url-shortener\", namespace=\"$namespace\"}[1m])) by (le, handler)) * 1000",
              "legendFormat": "{{ "{{handler}}" }}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ms", "custom": { "drawStyle": "line", "fillOpacity": 0, "lineWidth": 2 } } }
        },
        {
          "id": 101,
          "type": "row",
          "title": "HTTP Status Codes",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 1 }
        },
        {
          "id": 3,
          "title": "Response Codes by Handler (req/s)",
          "description": "Stacked rate of every response status, per handler. Under healthy traffic the stack is dominated by 2xx; 4xx/5xx surfaces here first under chaos.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 9, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"url-shortener\", namespace=\"$namespace\"}[1m])) by (handler, status)",
              "legendFormat": "{{ "{{handler}} → {{status}}" }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 30, "stacking": { "mode": "normal" } }
            }
          }
        },
        {
          "id": 4,
          "title": "Error Rates: 402 / 409 / 5xx (req/s)",
          "description": "402 = no PAYMENT-SIGNATURE header or payment didn't settle. 409 = duplicate settlement_tx_hash (replay caught at app layer). 503 = facilitator unreachable. All three should be ~0 under healthy traffic.",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 9, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"url-shortener\", namespace=\"$namespace\", status=\"402\"}[1m]))",
              "legendFormat": "402 (payment required / not settled)",
              "refId": "A"
            },
            {
              "expr": "sum(rate(http_requests_total{job=\"url-shortener\", namespace=\"$namespace\", status=\"409\"}[1m]))",
              "legendFormat": "409 (settlement_tx_hash replay)",
              "refId": "B"
            },
            {
              "expr": "sum(rate(http_requests_total{job=\"url-shortener\", namespace=\"$namespace\", status=\"503\"}[1m]))",
              "legendFormat": "503 (facilitator unreachable)",
              "refId": "C"
            },
            {
              "expr": "sum(rate(http_requests_total{job=\"url-shortener\", namespace=\"$namespace\", status=~\"5..\"}[1m]))",
              "legendFormat": "5xx (any server error)",
              "refId": "D"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 102,
          "type": "row",
          "title": "App Headlines",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 17, "w": 24, "h": 1 }
        },
        {
          "id": 5,
          "title": "Paid /shorten Success Rate (5m)",
          "description": "201 / total over rolling 5m for POST /shorten. Anything below 95% during chaos indicates real failures.",
          "type": "stat",
          "gridPos": { "x": 0, "y": 18, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "(sum(rate(http_requests_total{job=\"url-shortener\", namespace=\"$namespace\", handler=\"/shorten\", method=\"POST\", status=\"201\"}[5m])) / sum(rate(http_requests_total{job=\"url-shortener\", namespace=\"$namespace\", handler=\"/shorten\", method=\"POST\"}[5m]))) or vector(0)",
              "legendFormat": "201 rate",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "red" },
                  { "value": 0.9,  "color": "yellow" },
                  { "value": 0.95, "color": "green" }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 6,
          "title": "HTTP 402 Rate (5m)",
          "description": "Clients hitting /shorten without a PAYMENT-SIGNATURE header. Should be ~0 from the chaos loadgen (always sends one).",
          "type": "stat",
          "gridPos": { "x": 6, "y": 18, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(rate(payment_402_responses_total{job=\"url-shortener\", namespace=\"$namespace\"}[5m]))",
              "legendFormat": "402/s",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps", "color": { "mode": "fixed", "fixedColor": "orange" } } },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 7,
          "title": "Payment Replay Attempts (total)",
          "description": "settlement_tx_hash UNIQUE-constraint violations. Under Permit2 + facilitator idempotency, the on-chain layer never reverts on replay — this is the load-bearing replay signal at the app layer.",
          "type": "stat",
          "gridPos": { "x": 12, "y": 18, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(payment_replay_attempts_total{job=\"url-shortener\", namespace=\"$namespace\"})",
              "legendFormat": "replays",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 1,    "color": "red"   }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 8,
          "title": "Cache Hit Rate (Redis)",
          "description": "hits / (hits + misses) for GET /{code}. 100% means Redis is warm. Drops during chaos indicate Redis outage + Postgres fallback firing.",
          "type": "stat",
          "gridPos": { "x": 18, "y": 18, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(rate(url_shortener_cache_hits_total{job=\"url-shortener\", namespace=\"$namespace\"}[5m])) / (sum(rate(url_shortener_cache_hits_total{job=\"url-shortener\", namespace=\"$namespace\"}[5m])) + sum(rate(url_shortener_cache_misses_total{job=\"url-shortener\", namespace=\"$namespace\"}[5m])))",
              "legendFormat": "hit rate",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "red"    },
                  { "value": 0.5,  "color": "yellow" },
                  { "value": 0.8,  "color": "green"  }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 103,
          "type": "row",
          "title": "Payment Settlement (App ↔ Facilitator)",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 22, "w": 24, "h": 1 }
        },
        {
          "id": 9,
          "title": "Settlement Outcomes by Bucket (req/s)",
          "description": "App-perceived outcome of every settle_payment() call. Outcomes: settled, signature_invalid, facilitator_verify_failed, facilitator_settle_failed, facilitator_unreachable, header_malformed. Anything except 'settled' is worth investigating.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 23, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(payment_facilitator_total{job=\"url-shortener\", namespace=\"$namespace\"}[1m])) by (outcome)",
              "legendFormat": "{{ "{{outcome}}" }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 30, "stacking": { "mode": "normal" } }
            }
          }
        },
        {
          "id": 10,
          "title": "End-to-end Settlement Latency p50 / p95 / p99 (ms)",
          "description": "Time inside settle_payment() — header decode + /verify + /settle round-trips. p95 baseline is whatever the Radius facilitator's atomic settle takes (~500ms range). Sudden spikes correlate with chaos experiment #4 (facilitator egress).",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 23, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(payment_settlement_duration_seconds_bucket{job=\"url-shortener\", namespace=\"$namespace\"}[1m])) by (le)) * 1000",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(payment_settlement_duration_seconds_bucket{job=\"url-shortener\", namespace=\"$namespace\"}[1m])) by (le)) * 1000",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(payment_settlement_duration_seconds_bucket{job=\"url-shortener\", namespace=\"$namespace\"}[1m])) by (le)) * 1000",
              "legendFormat": "p99",
              "refId": "C"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ms" } }
        },
        {
          "id": 19,
          "title": "Facilitator Call Duration by Op p95 (ms)",
          "description": "Per-leg latency to the facilitator: /verify vs /settle. Lets us split 'facilitator is slow on the simulate' from 'facilitator is slow on the on-chain submit'. Load-bearing for chaos experiment #4.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 31, "w": 24, "h": 7 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(payment_facilitator_call_duration_seconds_bucket{job=\"url-shortener\", namespace=\"$namespace\"}[1m])) by (le, op)) * 1000",
              "legendFormat": "{{ "{{op}}" }} p95",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ms" } }
        },
        {
          "id": 104,
          "type": "row",
          "title": "Signer (Permit2 Signing)",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 38, "w": 24, "h": 1 }
        },
        {
          "id": 11,
          "title": "/sign-permit2 Outcomes (req/s)",
          "description": "Terminal state of every /sign-permit2 call. Under Permit2, the hot path is pure CPU — outcomes are essentially {success, signing_error, not_bootstrapped}. Anything but success warrants investigation.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 39, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(signer_sign_total{job=\"radius-signer\", namespace=\"$namespace\"}[1m])) by (outcome)",
              "legendFormat": "{{ "{{outcome}}" }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 30, "stacking": { "mode": "normal" } }
            }
          }
        },
        {
          "id": 12,
          "title": "/sign-permit2 Success Rate (5m)",
          "description": "success / total over a rolling 5m. Single number to glance at during a chaos run.",
          "type": "stat",
          "gridPos": { "x": 12, "y": 39, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "(sum(rate(signer_sign_total{job=\"radius-signer\", namespace=\"$namespace\", outcome=\"success\"}[5m])) / sum(rate(signer_sign_total{job=\"radius-signer\", namespace=\"$namespace\"}[5m]))) or vector(0)",
              "legendFormat": "success rate",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "red" },
                  { "value": 0.95, "color": "yellow" },
                  { "value": 0.99, "color": "green" }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 13,
          "title": "/sign-permit2 Duration p50 / p95 (ms)",
          "description": "Pure EIP-712 signing — should be sub-millisecond. Sourced from the FastAPI instrumentator (http_request_duration_seconds) since the signer no longer maintains its own duration histogram.",
          "type": "timeseries",
          "gridPos": { "x": 18, "y": 39, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"radius-signer\", namespace=\"$namespace\", handler=\"/sign-permit2\"}[1m])) by (le)) * 1000",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"radius-signer\", namespace=\"$namespace\", handler=\"/sign-permit2\"}[1m])) by (le)) * 1000",
              "legendFormat": "p95",
              "refId": "B"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ms" } }
        },
        {
          "id": 20,
          "title": "Permit2 Approval State (by wallet)",
          "description": "Boot-time SBC.approve(Permit2, MAX) per signer wallet. Each wallet contributes exactly one event at signer start: approved (one-time gas hit) or already_approved (no tx). approve_failed means the wallet can't serve /sign-permit2 (returns 503) — restart the signer pod once RPC recovers.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 47, "w": 12, "h": 7 },
          "targets": [
            {
              "expr": "sum(signer_permit2_approval_total{job=\"radius-signer\", namespace=\"$namespace\"}) by (outcome, wallet_index)",
              "legendFormat": "wallet {{ "{{wallet_index}} → {{outcome}}" }}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 16,
          "title": "Wallet SBC Balance (raw units, 6 decimals)",
          "description": "SBC balance per signer wallet. Trends down during the load test as each /shorten pulls amount from the wallet via Permit2. If a wallet flat-lines or hits 0 it's exhausted — refund via fund-test-wallet.sh.",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 47, "w": 12, "h": 7 },
          "targets": [
            {
              "expr": "signer_wallet_sbc_balance_units{job=\"radius-signer\", namespace=\"$namespace\"}",
              "legendFormat": "wallet {{ "{{wallet_index}}" }}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 106,
          "type": "row",
          "title": "Chaos Impact (overlay views)",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 54, "w": 24, "h": 1 }
        },
        {
          "id": 18,
          "title": "Money Shot: HTTP p99 vs Settlement p99 vs Facilitator-Verify p95 (ms)",
          "description": "The one panel to watch during chaos. End-user latency tracks the slowest of its deps. If HTTP+Settlement spike together → facilitator or upstream issue. If HTTP spikes alone → app issue (db/redis). If Facilitator-Verify spikes alone → facilitator's /verify is degraded while /settle is still OK (rare, but possible under chaos experiment #4).",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 55, "w": 24, "h": 9 },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"url-shortener\", namespace=\"$namespace\"}[1m])) by (le)) * 1000",
              "legendFormat": "App HTTP p99",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(payment_settlement_duration_seconds_bucket{job=\"url-shortener\", namespace=\"$namespace\"}[1m])) by (le)) * 1000",
              "legendFormat": "Settlement p99",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(payment_facilitator_call_duration_seconds_bucket{job=\"url-shortener\", namespace=\"$namespace\", op=\"verify\"}[1m])) by (le)) * 1000",
              "legendFormat": "Facilitator /verify p95",
              "refId": "C"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(payment_facilitator_call_duration_seconds_bucket{job=\"url-shortener\", namespace=\"$namespace\", op=\"settle\"}[1m])) by (le)) * 1000",
              "legendFormat": "Facilitator /settle p95",
              "refId": "D"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ms", "custom": { "drawStyle": "line", "fillOpacity": 0, "lineWidth": 2 } } }
        }
      ]
    }

{{- range .Values.appNamespaces }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: url-shortener-{{ . }}
  namespace: {{ . }}
  labels:
    # Must match kube-prometheus-stack.prometheus.prometheusSpec.serviceMonitorSelector
    release: observability
spec:
  # Sets job="url-shortener" on all scraped metrics (from app.kubernetes.io/name on the Service).
  # Without this, Prometheus auto-generates a messy label from the ServiceMonitor name.
  # Use the `namespace` label in queries to distinguish dev/staging/prod.
  jobLabel: "app.kubernetes.io/name"
  selector:
    matchLabels:
      app.kubernetes.io/name: url-shortener
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      # Explicitly copy the Kubernetes namespace into a `namespace` label on every scraped metric.
      # kube-prometheus-stack does this via default relabeling, but being explicit is safer and
      # makes it clear why {namespace="$namespace"} works in PromQL queries.
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
{{- end }}

# Namespaces where the URL shortener runs — ServiceMonitors are created for each
appNamespaces:
  - url-shortener-dev
  - url-shortener-staging
  - url-shortener-prod

kube-prometheus-stack:
  grafana:
    # Admin password from ESO-managed secret (grafana-admin-secret in monitoring ns)
    # Created by kubernetes/bootstrap/secrets/external-secrets-monitoring.yaml
    admin:
      existingSecret: grafana-admin-secret
      userKey: username
      passwordKey: password

    # Loki wired as additional datasource
    # Service name = <release-name>-loki = observability-loki (ArgoCD uses app name as release name)
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://observability-loki:3100
        access: proxy
        isDefault: false

    # Sidecar picks up dashboard ConfigMaps labelled grafana_dashboard=1 from any namespace
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL

  prometheus:
    prometheusSpec:
      # Retain 7 days of metrics — survives node scale-to-zero sessions
      retention: 7d

      # PVC-backed storage — without this, emptyDir is used and metrics are lost on node drain
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: standard
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

      # Watch ServiceMonitors labelled release=observability across all namespaces
      serviceMonitorSelector:
        matchLabels:
          release: observability
      serviceMonitorNamespaceSelector: {}

  alertmanager:
    enabled: false

  nodeExporter:
    enabled: true

promtail:
  # DaemonSet — runs on every node, reads pod logs from /var/log/pods and ships to Loki
  config:
    clients:
      - url: http://observability-loki:3100/loki/api/v1/push

loki:
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem

    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem    # filesystem is intentional — logs are ephemeral by design.
          # purpose is chaos experiment correlation, not long-term retention.
          # for persistence, swap to object_store: gcs + IAM bindings for Loki SA.
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    # Compactor must be enabled for retention_period to actually delete old logs
    compactor:
      retention_enabled: true
      delete_request_store: filesystem # for single-binary mode, as object store is not used

    limits_config:
      retention_period: 48h

  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 1Gi

  # Disable multi-tenant components not needed in single-binary mode
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

# Opt url-shortener-staging IN to Chaos Mesh fault injection.
# With controllerManager.enableFilterNamespace=true (see chaos-mesh.yaml),
# ONLY namespaces carrying this annotation can be targeted by any experiment.
# This is the blast-radius lock: prod, argocd, kube-system, monitoring, kargo
# are all permanently out of reach because they lack this annotation.
apiVersion: v1
kind: Namespace
metadata:
  name: url-shortener-staging
  annotations:
    chaos-mesh.org/inject: enabled
    # Safety: root-app manages this annotation but must NEVER prune the
    # namespace itself (that would delete all staging workloads + PVCs).
    argocd.argoproj.io/sync-options: Prune=false

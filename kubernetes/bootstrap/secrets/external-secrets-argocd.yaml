apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-repo-k8s-chaos-promotion
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: repo-k8s-chaos-promotion
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: "https://github.com/amoghjay/k8s-chaos-promotion.git"
        username: "amoghjay"
        password: "{{ .github_pat }}"
  data:
    - secretKey: github_pat
      remoteRef:
        key: github-pat

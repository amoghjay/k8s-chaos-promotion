apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: url-shortener
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: url-shortener
      sources:
        stages:
          - dev  # only receives freight that has been verified in dev

  promotionTemplate:
    spec:
      vars:
        - name: repoURL
          value: https://github.com/amoghjay/k8s-chaos-promotion.git

      steps:
        # Step 1: Clone repo, check out main
        - uses: git-clone
          config:
            repoURL: ${{ vars.repoURL }}
            checkout:
              - branch: main
                path: ./src

        # Step 2: Update image.tag in the env values file
        - uses: yaml-update
          as: update-image
          config:
            path: ./src/helm/url-shortener/values-${{ ctx.stage }}.yaml
            updates:
              - key: image.tag
                value: ${{ quote(imageFrom("us-central1-docker.pkg.dev/amoghdevops/k8s-chaos-demo/url-shortener").Tag) }}

        # Step 3: Update deployedCommit in config file
        - uses: yaml-update
          config:
            path: ./src/helm/url-shortener/config-${{ ctx.stage }}.yaml
            updates:
              - key: deployedCommit
                value: ${{ quote(imageFrom("us-central1-docker.pkg.dev/amoghdevops/k8s-chaos-demo/url-shortener").Tag) }}

        # Step 4: Commit both changed files
        - uses: git-commit
          config:
            path: ./src
            message: "chore(${{ ctx.stage }}): promote to ${{ imageFrom('us-central1-docker.pkg.dev/amoghdevops/k8s-chaos-demo/url-shortener').Tag }}"

        # Step 5: Push to a generated temp branch (not directly to main)
        - uses: git-push
          as: push
          config:
            path: ./src
            generateTargetBranch: true

        # Step 6: Open PR from temp branch → main
        - uses: git-open-pr
          as: open-pr
          config:
            repoURL: ${{ vars.repoURL }}
            createTargetBranch: false
            sourceBranch: ${{ outputs.push.branch }}
            targetBranch: main

        # Step 7: Merge the PR (retries until mergeable)
        - uses: git-merge-pr
          config:
            repoURL: ${{ vars.repoURL }}
            prNumber: ${{ outputs['open-pr'].pr.id }}
            wait: true

        # Step 8: Trigger immediate ArgoCD sync after PR merges
        - uses: argocd-update
          config:
            apps:
              - name: url-shortener-${{ ctx.stage }}
                sources:
                  - repoURL: ${{ vars.repoURL }}

  # Health check after promotion — Phase 7 adds chaos experiments here
  verification:
    analysisTemplates:
      - name: health-check
    args:
      - name: service-url
        value: http://url-shortener-staging.url-shortener-staging.svc.cluster.local:80

apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: promote-with-pr
  namespace: url-shortener
spec:
  vars:
    - name: repoURL

  steps:
    # Step 1: Clone repo, check out main
    - uses: git-clone
      config:
        repoURL: ${{ vars.repoURL }}
        checkout:
          - branch: main
            path: ./src

    # Step 2: Read current deployedCommit to store as previousCommit
    - uses: yaml-parse
      as: parse-config
      config:
        path: ./src/helm/url-shortener/config-${{ ctx.stage }}.yaml
        outputs:
          - name: previousCommit
            fromExpression: deployedCommit

    # Step 3: Update image.tag in the env values file
    - uses: yaml-update
      as: update-image
      config:
        path: ./src/helm/url-shortener/values-${{ ctx.stage }}.yaml
        updates:
          - key: image.tag
            value: ${{ quote(imageFrom("us-central1-docker.pkg.dev/amoghdevops/k8s-chaos-demo/url-shortener").Tag) }}

    # Step 4: Update deployment tracking in config file
    - uses: yaml-update
      as: update-config
      config:
        path: ./src/helm/url-shortener/config-${{ ctx.stage }}.yaml
        updates:
          - key: deployedCommit
            value: ${{ quote(imageFrom("us-central1-docker.pkg.dev/amoghdevops/k8s-chaos-demo/url-shortener").Tag) }}
          - key: previousCommit
            value: ${{ quote(outputs['parse-config'].previousCommit) }}

    # Step 5: Commit both changed files
    - uses: git-commit
      config:
        path: ./src
        message: "chore(${{ ctx.stage }}): promote to ${{ imageFrom('us-central1-docker.pkg.dev/amoghdevops/k8s-chaos-demo/url-shortener').Tag }}"

    # Step 6: Push to a generated temp branch (not directly to main)
    - uses: git-push
      as: push
      config:
        path: ./src
        generateTargetBranch: true  # creates kargo/promote-<uuid> branch

    # Step 7: Open PR from temp branch → main with auto-merge enabled
    # Requires: Settings → General → Allow auto-merge enabled on the GitHub repo
    - uses: git-open-pr
      as: open-pr
      config:
        repoURL: ${{ vars.repoURL }}
        createTargetBranch: false
        sourceBranch: ${{ outputs.push.branch }}
        targetBranch: main
        autoMerge: true  # GitHub merges automatically once checks pass

    # Step 8: Block promotion completion until PR is merged
    # Freight is only marked verified after the commit lands on main
    - uses: git-wait-for-pr
      config:
        repoURL: ${{ vars.repoURL }}
        prNumber: ${{ outputs['open-pr'].pr.id }}

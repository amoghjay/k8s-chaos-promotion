apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: promote-with-pr
  namespace: url-shortener
spec:
  vars:
    - name: repoURL

  steps:
    # Step 1: Clone repo, check out main. Alias `clone` exposes
    # `outputs.clone.commits.src` — the HEAD SHA of main at clone time,
    # used below to detect no-op promotions.
    - uses: git-clone
      as: clone
      config:
        repoURL: ${{ vars.repoURL }}
        checkout:
          - branch: main
            path: src

    # Step 2: Update image.tag in the env values file
    - uses: yaml-update
      as: update-image
      config:
        path: src/helm/url-shortener/values-${{ ctx.stage }}.yaml
        updates:
          - key: image.tag
            value: ${{ quote(imageFrom("us-central1-docker.pkg.dev/ajprojectplatform/k8s-chaos-demo/url-shortener").Tag) }}

    # Step 3: Update deployedCommit in config file
    - uses: yaml-update
      config:
        path: src/helm/url-shortener/config-${{ ctx.stage }}.yaml
        updates:
          - key: deployedCommit
            value: ${{ quote(imageFrom("us-central1-docker.pkg.dev/ajprojectplatform/k8s-chaos-demo/url-shortener").Tag) }}

    # Step 4: Commit both changed files. Alias `commit` exposes
    # `outputs.commit.commit` — equals the original HEAD SHA when no diff was
    # produced, which is how downstream steps detect a no-op promotion.
    - uses: git-commit
      as: commit
      config:
        path: src
        message: "chore(${{ ctx.stage }}): promote to ${{ imageFrom('us-central1-docker.pkg.dev/ajprojectplatform/k8s-chaos-demo/url-shortener').Tag }}"

    # Step 5: Push to a generated temp branch (skip if no commit was produced).
    - uses: git-push
      as: push
      if: ${{ outputs.commit.commit != outputs.clone.commits.src }}
      config:
        path: src
        generateTargetBranch: true

    # Step 6: Open PR from temp branch → main with auto-merge enabled.
    # Requires: Settings → General → Allow auto-merge enabled on the GitHub repo.
    - uses: git-open-pr
      as: open-pr
      if: ${{ outputs.commit.commit != outputs.clone.commits.src }}
      config:
        repoURL: ${{ vars.repoURL }}
        createTargetBranch: false
        sourceBranch: ${{ outputs.push.branch }}
        targetBranch: main
        autoMerge: true

    # Step 7: Block until PR merges. Alias `wait-for-pr` exposes
    # `outputs['wait-for-pr'].commit` — the merge commit SHA on main, used by
    # step 8 as the desiredRevision so Kargo waits for ArgoCD to observe it.
    - uses: git-wait-for-pr
      as: wait-for-pr
      if: ${{ outputs.commit.commit != outputs.clone.commits.src }}
      config:
        repoURL: ${{ vars.repoURL }}
        prNumber: ${{ outputs['open-pr'].pr.id }}

    # Step 8: Trigger ArgoCD sync and wait until the Application has
    # observably synced to the merge commit. retry.timeout gives ArgoCD's own
    # reconcile loop time to pick up the new commit on main.
    - uses: argocd-update
      if: ${{ outputs.commit.commit != outputs.clone.commits.src }}
      retry:
        timeout: 10m
      config:
        apps:
          - name: url-shortener-${{ ctx.stage }}
            sources:
              - repoURL: ${{ vars.repoURL }}
                desiredRevision: ${{ outputs['wait-for-pr'].commit }}

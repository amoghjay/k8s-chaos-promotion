# Render the ConfigMap from scripts/loadgen.js with:
# ./kubernetes/jobs/render-loadgen-manifest.sh | kubectl apply -f -
apiVersion: batch/v1
kind: Job
metadata:
  name: loadgen
  namespace: url-shortener-staging
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: __LOADGEN_IMAGE__
          imagePullPolicy: IfNotPresent
          args: ['run', '/scripts/loadgen.js']
          env:
            - name: BASE_URL
              value: "http://url-shortener-staging.url-shortener-staging.svc.cluster.local:80"
            - name: PAYMENT_ENABLED
              value: "true"
            - name: VUS
              value: "3"
            - name: LOAD_PROFILE
              value: "arrival-rate"
            - name: ARRIVAL_RATE
              value: "60"
            - name: ARRIVAL_TIME_UNIT
              value: "1m"
            - name: DURATION
              value: "5m"
            - name: CHAIN_ID
              value: "72344"
            - name: SBC_CONTRACT_ADDRESS
              value: "0x33ad9e4bd16b69b5bfded37d8b5d9ff9aba014fb"
            - name: SBC_AMOUNT
              value: "1000"
            - name: TX_GAS_LIMIT
              value: "100000"
            - name: RECEIPT_TIMEOUT_S
              value: "30"
            - name: PRECHECK_TIMEOUT
              value: "5s"
            - name: RPC_URL
              valueFrom:
                secretKeyRef:
                  name: url-shortener-staging-secret
                  key: RADIUS_RPC_URL
            - name: SERVICE_WALLET_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: url-shortener-staging-secret
                  key: SERVICE_WALLET_ADDRESS
            - name: WALLET_KEY_1
              valueFrom:
                secretKeyRef:
                  name: loadgen-wallet-secret
                  key: WALLET_KEY_1
            - name: WALLET_KEY_2
              valueFrom:
                secretKeyRef:
                  name: loadgen-wallet-secret
                  key: WALLET_KEY_2
            - name: WALLET_KEY_3
              valueFrom:
                secretKeyRef:
                  name: loadgen-wallet-secret
                  key: WALLET_KEY_3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: k6-script
              mountPath: /scripts
      volumes:
        - name: k6-script
          configMap:
            name: k6-loadgen-script

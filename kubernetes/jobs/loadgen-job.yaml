apiVersion: batch/v1
kind: Job
metadata:
  name: loadgen
  namespace: url-shortener-staging
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  selector:
    matchLabels:
      job-name: loadgen
  template:
    metadata:
      labels:
        job-name: loadgen
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: us-central1-docker.pkg.dev/amoghdevops/k8s-chaos-demo/k6-ethereum:latest
          imagePullPolicy: IfNotPresent
          args: ['run', '/scripts/loadgen.js']
          env:
            - name: BASE_URL
              value: "http://url-shortener-staging.url-shortener-staging.svc.cluster.local:80"
            - name: SIGNER_URL
              value: "http://radius-signer.url-shortener-staging.svc.cluster.local:8080"
            - name: PAYMENT_ENABLED
              value: "true"
            - name: VUS
              value: "3"
            - name: LOAD_PROFILE
              value: "arrival-rate"
            - name: ARRIVAL_RATE
              value: "60"
            - name: ARRIVAL_TIME_UNIT
              value: "1m"
            - name: DURATION
              value: "5m"
            - name: CHAIN_ID
              value: "72344"
            - name: SBC_CONTRACT_ADDRESS
              value: "0x33ad9e4bd16b69b5bfded37d8b5d9ff9aba014fb"
            - name: SBC_AMOUNT
              value: "1000"
            - name: TX_GAS_LIMIT
              value: "100000"
            - name: RECEIPT_TIMEOUT_S
              value: "30"
            - name: PRECHECK_TIMEOUT
              value: "5s"
            - name: RPC_URL
              valueFrom:
                secretKeyRef:
                  name: url-shortener-staging-secret
                  key: RADIUS_RPC_URL
            - name: SERVICE_WALLET_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: url-shortener-staging-secret
                  key: SERVICE_WALLET_ADDRESS
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: k6-script
              mountPath: /scripts
      volumes:
        - name: k6-script
          configMap:
            name: k6-loadgen-script

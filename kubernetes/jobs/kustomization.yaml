apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: url-shortener-staging

resources:
  - external-secret-loadgen.yaml
  - external-secret-signer.yaml
  - radius-signer.yaml
  - loadgen-job.yaml

configMapGenerator:
  - name: k6-loadgen-script
    files:
      - loadgen.js=scripts/loadgen.js

generatorOptions:
  disableNameSuffixHash: true

images:
  # Updated automatically by .github/workflows/build-radius-signer.yaml on main.
  - name: us-central1-docker.pkg.dev/ajprojectplatform/k8s-chaos-demo/radius-signer
    newTag: sha-1a78ed3

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: url-shortener-staging

resources:
  - external-secret-loadgen.yaml
  - radius-signer.yaml
  - loadgen-job.yaml

configMapGenerator:
  - name: k6-loadgen-script
    files:
      - loadgen.js=scripts/loadgen.js

generatorOptions:
  disableNameSuffixHash: true

images:
  # Updated automatically by .github/workflows/build-radius-signer.yaml on main.
  - name: us-central1-docker.pkg.dev/ajprojectplatform/k8s-chaos-demo/radius-signer
    newTag: sha-e25a43b
  # Used only by radius-tps-bench-job.yaml (still imports k6/x/ethereum).
  # loadgen-job.yaml moved off this image in Phase 5.5 once signing was extracted
  # to the radius-signer service — loadgen.js only needs vanilla k6/http now.
  # Updated automatically by .github/workflows/build-k6-ethereum.yaml on main.
  - name: us-central1-docker.pkg.dev/ajprojectplatform/k8s-chaos-demo/k6-ethereum
    newTag: sha-7f73283

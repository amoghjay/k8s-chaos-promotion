apiVersion: apps/v1
kind: Deployment
metadata:
  name: radius-signer
  namespace: url-shortener-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radius-signer
  template:
    metadata:
      labels:
        app: radius-signer
    spec:
      containers:
        - name: radius-signer
          image: us-central1-docker.pkg.dev/amoghdevops/k8s-chaos-demo/radius-signer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: CHAIN_ID
              value: "72344"
            - name: SBC_CONTRACT_ADDRESS
              value: "0x33ad9e4bd16b69b5bfded37d8b5d9ff9aba014fb"
            - name: SBC_AMOUNT
              value: "1000"
            - name: TX_GAS_LIMIT
              value: "100000"
            - name: RECEIPT_TIMEOUT_S
              value: "30"
            - name: RPC_URL
              valueFrom:
                secretKeyRef:
                  name: url-shortener-staging-secret
                  key: RADIUS_RPC_URL
            - name: SERVICE_WALLET_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: url-shortener-staging-secret
                  key: SERVICE_WALLET_ADDRESS
            - name: WALLET_KEY_1
              valueFrom:
                secretKeyRef:
                  name: loadgen-wallet-secret
                  key: WALLET_KEY_1
            - name: WALLET_KEY_2
              valueFrom:
                secretKeyRef:
                  name: loadgen-wallet-secret
                  key: WALLET_KEY_2
            - name: WALLET_KEY_3
              valueFrom:
                secretKeyRef:
                  name: loadgen-wallet-secret
                  key: WALLET_KEY_3
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: radius-signer
  namespace: url-shortener-staging
  labels:
    # ServiceMonitor selects on this; jobLabel="app.kubernetes.io/name" makes
    # Prometheus emit job="radius-signer" on every scraped sample.
    app.kubernetes.io/name: radius-signer
spec:
  selector:
    app: radius-signer
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: radius-signer
  namespace: url-shortener-staging
  labels:
    # Must match kube-prometheus-stack.prometheus.prometheusSpec.serviceMonitorSelector.
    release: observability
spec:
  jobLabel: app.kubernetes.io/name
  selector:
    matchLabels:
      app.kubernetes.io/name: radius-signer
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      relabelings:
        - action: replace
          sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace

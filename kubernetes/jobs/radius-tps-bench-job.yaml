apiVersion: batch/v1
kind: Job
metadata:
  name: radius-tps-bench
  namespace: url-shortener-staging
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  backoffLimit: 0
  selector:
    matchLabels:
      job-name: radius-tps-bench
  template:
    metadata:
      labels:
        job-name: radius-tps-bench
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: us-central1-docker.pkg.dev/ajprojectplatform/k8s-chaos-demo/k6-ethereum:latest
          args: ['run', '/scripts/radius-tps-bench.js']
          env:
            - name: CHAIN_ID
              value: "72344"
            - name: TX_COUNT
              value: "100"
            - name: RPC_URL
              valueFrom:
                secretKeyRef:
                  name: url-shortener-staging-secret
                  key: RADIUS_RPC_URL
            - name: SERVICE_WALLET_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: url-shortener-staging-secret
                  key: SERVICE_WALLET_ADDRESS
            - name: WALLET_KEY_1
              valueFrom:
                secretKeyRef:
                  name: loadgen-wallet-secret
                  key: WALLET_KEY_1
          volumeMounts:
            - name: k6-script
              mountPath: /scripts
      volumes:
        - name: k6-script
          configMap:
            name: k6-tps-bench-script

name: Build & Push radius-signer

on:
  push:
    branches: [main]
    paths: ["signer/**"]
  pull_request:
    branches: [main]
    paths: ["signer/**"]
  workflow_dispatch:

env:
  IMAGE: us-central1-docker.pkg.dev/amoghdevops/k8s-chaos-demo/radius-signer

jobs:
  build-radius-signer:
    name: Build → Push radius-signer
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image tags
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/241566214193/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
          service_account: github-actions-sa@amoghdevops.iam.gserviceaccount.com

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./signer
          file: ./signer/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.short_sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Pin signer image tag in jobs Kustomize
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          NEW_TAG: sha-${{ steps.vars.outputs.short_sha }}
        run: |
          sed -i.bak \
            '/name: us-central1-docker.pkg.dev\/amoghdevops\/k8s-chaos-demo\/radius-signer/{n;s/newTag:.*/    newTag: '"${NEW_TAG}"'/;}' \
            kubernetes/jobs/kustomization.yaml
          rm kubernetes/jobs/kustomization.yaml.bak

      - name: Commit signer image pin
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          NEW_TAG: sha-${{ steps.vars.outputs.short_sha }}
        run: |
          if git diff --quiet -- kubernetes/jobs/kustomization.yaml; then
            echo "kustomization already pinned to ${NEW_TAG}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kubernetes/jobs/kustomization.yaml
          git commit -m "chore(jobs): pin radius-signer image to ${NEW_TAG}"
          git push origin HEAD:${GITHUB_REF_NAME}

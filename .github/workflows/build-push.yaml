name: Build, Sign & Push

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
  pull_request:
    branches:
      - main
    paths:
      - "app/**"

env:
  IMAGE: us-central1-docker.pkg.dev/amoghdevops/k8s-chaos-demo/url-shortener
  # Used by Cosign for keyless signing (OIDC-based)
  COSIGN_EXPERIMENTAL: "true"

jobs:
  build-push:
    name: Build → Push → Sign
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for GCP Workload Identity Federation + Cosign keyless signing
      id-token: write

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Docker Buildx (for multi-platform and cache support) ────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Authenticate to GCP via Workload Identity Federation ────────────────
      # Keyless — no stored secrets. GitHub OIDC token is exchanged for a
      # short-lived GCP access token scoped to github-actions-sa.
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/241566214193/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
          service_account: github-actions-sa@amoghdevops.iam.gserviceaccount.com

      # ── Configure Docker to use gcloud credentials for GAR ──────────────────
      - name: Configure Docker for GAR
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # ── Derive image tags ───────────────────────────────────────────────────
      # On push to main  → :sha-<short> + :latest
      # On pull_request  → :pr-<number> (not pushed)
      # Kargo Warehouse picks up sha- tags via NewestBuild strategy
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr

      # ── Build & push ────────────────────────────────────────────────────────
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache stored in GAR alongside the image
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      # ── Cosign keyless signing ───────────────────────────────────────────────
      # Skipped on PRs (image wasn't pushed).
      # Signature stored as an OCI artifact in GAR alongside the image.
      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            "${{ env.IMAGE }}@${DIGEST}"

      # ── Quick smoke-test ─────────────────────────────────────────────────────
      # Pull the freshly built image and verify it starts + /health returns 200.
      # Only runs on main / tag pushes (not PRs, where image wasn't pushed).
      - name: Smoke test
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          docker pull "${{ env.IMAGE }}@${DIGEST}"
          docker run -d --name smoke-redis  redis:7-alpine
          docker run -d --name smoke-postgres \
            -e POSTGRES_USER=urlshortener \
            -e POSTGRES_PASSWORD=password \
            -e POSTGRES_DB=urlshortener \
            postgres:16-alpine
          sleep 5
          docker run --rm \
            --link smoke-postgres:postgres \
            --link smoke-redis:redis \
            -e DATABASE_URL=postgresql://urlshortener:password@postgres:5432/urlshortener \
            -e REDIS_URL=redis://redis:6379 \
            -e BASE_URL=http://localhost:8000 \
            -p 8000:8000 \
            --name smoke-app \
            -d "${{ env.IMAGE }}@${DIGEST}"
          sleep 10
          curl --fail --retry 5 --retry-delay 3 http://localhost:8000/health
          docker rm -f smoke-app smoke-redis smoke-postgres
